<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --cream:#efedea; --bronze:#9b6838; --espresso:#2b291f;
    --card:#f7f5f1; --line:#e1ddd5;
    --muted:#8c8779; --up:#5f7a52; --down:#b3543f;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--cream);color:var(--espresso);font-family:'Inter',system-ui,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased}
  .serif{font-family:'Cormorant Garamond',Georgia,serif}
  a{color:var(--bronze);text-decoration:none}

  /* Header */
  header{background:var(--espresso);color:var(--cream);padding:26px 40px 22px}
  .head-row{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:18px;max-width:1180px;margin:0 auto}
  .logo-wrap{display:flex;flex-direction:column;gap:10px}
  .logo-wrap svg{height:17px;width:auto}
  .subtitle{font-family:'Cormorant Garamond',serif;font-size:15px;letter-spacing:.18em;text-transform:uppercase;color:#c9b79f}
  .month-pick{display:flex;align-items:center;gap:10px}
  .month-pick label{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#b6a98f}
  select#month{background:#3a382c;color:var(--cream);border:1px solid #57543f;border-radius:7px;padding:8px 12px;font-family:inherit;font-size:14px;cursor:pointer}

  /* Nav */
  nav{background:#24221a;display:flex;justify-content:center;gap:4px;padding:0 20px;position:sticky;top:0;z-index:20;flex-wrap:wrap}
  nav button{background:none;border:none;color:#b6a98f;font-family:'Cormorant Garamond',serif;font-size:18px;letter-spacing:.04em;padding:13px 20px;cursor:pointer;border-bottom:2px solid transparent;transition:.18s}
  nav button:hover{color:var(--cream)}
  nav button.active{color:var(--cream);border-bottom-color:var(--bronze)}

  main{max-width:1180px;margin:0 auto;padding:34px 40px 70px}
  .page{display:none;animation:fade .35s ease}
  .page.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  .page-title{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:500;letter-spacing:.01em}
  .page-sub{color:var(--muted);font-size:13.5px;margin-top:3px;margin-bottom:26px}
  .section-label{font-family:'Cormorant Garamond',serif;font-size:13px;letter-spacing:.22em;text-transform:uppercase;color:var(--bronze);margin:30px 0 14px;display:flex;align-items:center;gap:12px}
  .section-label::after{content:"";flex:1;height:1px;background:var(--line)}

  .grid{display:grid;gap:14px}
  .g4{grid-template-columns:repeat(4,1fr)}
  .g5{grid-template-columns:repeat(5,1fr)}
  .g3{grid-template-columns:repeat(3,1fr)}
  .g2{grid-template-columns:repeat(2,1fr)}
  @media(max-width:900px){.g4,.g5,.g3{grid-template-columns:repeat(2,1fr)}}

  .tile{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:16px 18px}
  .tile .lbl{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:9px}
  .tile .val{font-family:'Cormorant Garamond',serif;font-size:31px;font-weight:600;line-height:1}
  .tile .delta{font-size:12.5px;margin-top:7px;font-weight:500}
  .delta.up{color:var(--up)} .delta.down{color:var(--down)} .delta.flat{color:var(--muted)}
  .tile.hero,.tile.bronze{background:var(--card);color:var(--espresso);border:1px solid var(--line);border-top:2px solid var(--bronze)}
  .tile.hero .lbl,.tile.bronze .lbl{color:var(--muted)}
  .tile.hero .val,.tile.bronze .val{color:var(--espresso)}

  .chart-card{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:18px 20px 20px;margin-top:16px}
  .chart-head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:6px}
  .chart-head .ttl{font-family:'Cormorant Garamond',serif;font-size:19px}
  .seg{display:flex;gap:4px;flex-wrap:wrap}
  .seg button{background:none;border:1px solid var(--line);color:var(--muted);font-family:inherit;font-size:11.5px;padding:5px 11px;border-radius:20px;cursor:pointer;transition:.15s}
  .seg button:hover{border-color:var(--bronze);color:var(--bronze)}
  .seg button.on{background:var(--bronze);border-color:var(--bronze);color:#fff}
  .chart-box{position:relative;height:270px;margin-top:8px}

  /* brand wordmarks */
  .brandmark{margin:6px 0 2px}
  .wm-app{font-family:'Cormorant Garamond',serif;font-size:30px;letter-spacing:.34em;font-weight:500;text-transform:uppercase}
  .wm-folia{font-family:'Cormorant Garamond',serif;font-size:34px;letter-spacing:.2em;font-weight:500;text-transform:uppercase}
  .wm-folia small{display:block;font-size:11px;letter-spacing:.45em;margin-top:2px;color:var(--muted)}
  .wm-bee{font-family:'Dancing Script',cursive;font-size:42px;color:var(--bronze);line-height:.9}
  .wm-bee small{font-family:'Inter',sans-serif;display:block;font-size:10px;letter-spacing:.5em;text-transform:uppercase;color:var(--muted);margin-top:-2px}
  .brand-note{font-size:13.5px;color:#5d5a4e;background:var(--card);border-left:3px solid var(--bronze);padding:11px 16px;border-radius:0 8px 8px 0;margin:4px 0 8px}

  .pill{display:inline-block;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;background:#e6ddd0;color:var(--bronze);padding:3px 9px;border-radius:20px;margin-left:8px;vertical-align:middle}
  .organic-flag{font-size:11.5px;color:var(--muted);margin-top:10px;font-style:italic}

  /* influencer */
  .act-card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin-bottom:14px}
  .act-head{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px;border-bottom:1px solid var(--line);padding-bottom:11px;margin-bottom:13px}
  .act-handle{font-family:'Cormorant Garamond',serif;font-size:23px;font-weight:600}
  .act-meta{font-size:12.5px;color:var(--muted)}
  .act-stats{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
  @media(max-width:900px){.act-stats{grid-template-columns:repeat(3,1fr)}}
  .mini .n{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600}
  .mini .k{font-size:10.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-top:2px}
  .act-links{margin-top:12px;font-size:12.5px}
  .footnote{font-size:11.5px;color:var(--muted);margin-top:30px;border-top:1px solid var(--line);padding-top:14px;line-height:1.7}
</style>

/* ============ helpers ============ */
const BRONZE="#9b6838", ESP="#2b291f", MUTED="#8c8779", LINE="#e1ddd5";
const fmt=n=>n==null?"—":n.toLocaleString("en-US");
const monthsWithData=[0,1,2,3,4,5,6,7,8]; /* indices that have data */
let cur=8; /* current month index, default May '26 */

function prevIdx(arr,i){for(let j=i-1;j>=0;j--){if(arr[j]!=null)return j;}return -1;}
function deltaHTML(arr,i,opts={}){
  const v=arr[i]; if(v==null) return '<div class="delta flat">no data</div>';
  const p=prevIdx(arr,i); if(p<0) return '<div class="delta flat">baseline</div>';
  const pv=arr[p];
  if(opts.abs){ const d=v-pv; const cls=d>0?'up':(d<0?'down':'flat'); const s=d>0?'+':''; return `<div class="delta ${cls}">${s}${d.toLocaleString()} vs ${MONTHS[p].trim()}</div>`; }
  const pct=pv===0?100:((v-pv)/Math.abs(pv)*100); const cls=pct>0?'up':(pct<0?'down':'flat'); const ar=pct>0?'↑':(pct<0?'↓':'→');
  return `<div class="delta ${cls}">${ar} ${Math.abs(pct).toFixed(1)}% vs ${MONTHS[p].trim()}</div>`;
}
function tile(lbl,arr,i,opts={}){
  const v=arr[i];
  return `<div class="tile ${opts.cls||''}"><div class="lbl">${lbl}</div><div class="val">${fmt(v)}</div>${deltaHTML(arr,i,opts)}</div>`;
}
function combined(channel,metric){
  return MONTHS.map((_,i)=>{
    let s=0,any=false;
    for(const k of ['appellation','folia','beeline']){const a=D[k][channel][metric];if(a&&a[i]!=null){s+=a[i];any=true;}}
    return any?s:null;
  });
}

/* ============ snapshot ============ */
function renderSnapshot(){
  const igV=combined('ig','views');
  const inf=INF[MONTHS[cur].trim()] || INF[MONTHS[cur]];
  const m=MONTHS[cur].trim();
  let html=`<div class="page-title serif">The month at a glance</div>
    <div class="page-sub">${m} · organic performance across all three brands</div>

    <div class="section-label">How each brand is performing</div>
    <div class="grid g3">${brandCard('appellation')}${brandCard('folia')}${brandCard('beeline')}</div>`;

  if(inf){
    html+=`<div class="section-label">Influencer impact</div>
    <div class="grid g4">
      <div class="tile bronze"><div class="lbl">Activations</div><div class="val">${inf.totals.activations}</div><div class="delta" style="color:var(--bronze)">${inf.totals.posts} in-grid posts</div></div>
      <div class="tile hero"><div class="lbl">Creator audience reached</div><div class="val">${inf.totals.audience}</div><div class="delta" style="color:var(--muted)">combined following</div></div>
      ${tileStatic('Post views',inf.totals.views)}
      ${tileStatic('Accounts reached',inf.totals.reached)}
    </div>`;
  }

  html+=`<div class="chart-card"><div class="chart-head"><div class="ttl serif">Combined Instagram organic views over time</div></div>
    <div class="chart-box"><canvas id="snapChart" role="img" aria-label="Combined Instagram organic views by month"></canvas></div></div>`;

  html+=`<div class="footnote">Organic figures only; paid/boosted reach is excluded throughout. Where the Instagram app blends organic and paid, the Meta Business Suite “From organic” value is used. Views for Sep&nbsp;2025–Mar&nbsp;2026 were pulled from the app top-line and may include some paid; May&nbsp;2026 is the first cleanly separated organic month. February and April 2026 are being backfilled brand by brand; trend lines connect across any month still pending. Organic reach for Folia and Beeline is only available from early 2026, so those reach lines begin partway through.</div>`;
  document.getElementById('p-snapshot').innerHTML=html;
  drawSnap(igV);
}
function combinedFollowGrowth(){
  return MONTHS.map((_,i)=>{let s=0,any=false;for(const k of ['appellation','folia','beeline']){const a=D[k].fb.follows;}
    /* net IG growth derived from total followers diff per brand */
    for(const k of ['appellation','folia','beeline']){const f=D[k].ig.followers;const p=prevIdx(f,i);if(f[i]!=null&&p>=0){s+=f[i]-f[p];any=true;}}
    return any?s:null;});
}
function tileStatic(lbl,v){return `<div class="tile"><div class="lbl">${lbl}</div><div class="val">${fmt(v)}</div></div>`;}
function brandCard(key){
  const b=D[key];
  const wm = key==='appellation'?'<span class="wm-app" style="font-size:19px">Appellation</span>'
    : key==='folia'?'<span class="wm-folia" style="font-size:21px">Folia</span>'
    : '<span class="wm-folia" style="font-size:21px">Beeline</span>';
  const row=(lbl,val)=>`<div style="display:flex;justify-content:space-between;font-size:12.5px;color:var(--muted);margin-top:5px"><span>${lbl}</span><strong style="color:var(--espresso)">${fmt(val)}</strong></div>`;
  const sub=(t,top)=>`<div style="font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--bronze);margin-top:${top}px;margin-bottom:1px;border-top:1px solid var(--line);padding-top:9px">${t}</div>`;
  return `<div class="tile" style="padding:16px 18px">
    <div style="min-height:30px;margin-bottom:4px">${wm}</div>
    ${sub('Instagram',2)}
    ${row('Organic views',b.ig.views[cur])}
    ${row('Interactions',b.ig.interactions[cur])}
    ${row('Followers',b.ig.followers[cur])}
    ${sub('Facebook',12)}
    ${row('Organic views',b.fb.views[cur])}
    ${row('Interactions',b.fb.interactions[cur])}
    ${row('Followers',b.fb.followers[cur])}
  </div>`;
}

/* ============ brand page ============ */
function renderBrand(key){
  const b=D[key];
  const markHTML = key==='appellation'?'<div class="wm-app">Appellation</div>'
    : key==='folia'?'<div class="wm-folia">Folia<small>Bar &amp; Kitchen</small></div>'
    : '<div class="wm-folia">Beeline<small>Andy’s Rooftop</small></div>';
  let html=`<div class="brandmark">${markHTML}</div>
    <div class="page-sub" style="margin-top:8px">${MONTHS[cur].trim()} · organic Instagram &amp; Facebook</div>
    <div class="brand-note">${b.note}</div>

    <div class="section-label"><i></i>Instagram</div>
    <div class="grid g4">
      ${tile('Organic views',b.ig.views,cur,{cls:'hero'})}
      ${tile('Organic reach',b.ig.reach,cur,{cls:'bronze'})}
      ${tile('Interactions',b.ig.interactions,cur)}
      ${tile('Total followers',b.ig.followers,cur)}
    </div>
    <div class="chart-card">
      <div class="chart-head"><div class="ttl serif">Instagram trend</div>
        <div class="seg" data-chart="${key}-ig">
          <button class="on" data-m="views">Views</button>
          <button data-m="reach">Reach</button>
          <button data-m="interactions">Interactions</button>
          <button data-m="followers">Followers</button>
        </div></div>
      <div class="chart-box"><canvas id="${key}-ig-canvas" role="img" aria-label="${key} Instagram trend"></canvas></div>
    </div>

    <div class="section-label">Facebook</div>
    <div class="grid g3">
      ${tile('Organic views',b.fb.views,cur,{cls:'hero'})}
      ${tile('Interactions',b.fb.interactions,cur)}
      ${tile('Total followers',b.fb.followers,cur)}
    </div>
    <div class="chart-card">
      <div class="chart-head"><div class="ttl serif">Facebook trend</div>
        <div class="seg" data-chart="${key}-fb">
          <button class="on" data-m="views">Views</button>
          <button data-m="interactions">Interactions</button>
          <button data-m="followers">Followers</button>
        </div></div>
      <div class="chart-box"><canvas id="${key}-fb-canvas" role="img" aria-label="${key} Facebook trend"></canvas></div>
    </div>
    <div class="organic-flag">Facebook has no organic reach metric in Meta, so reach is omitted for Facebook by design.</div>`;
  document.getElementById('p-'+key).innerHTML=html;
  makeTrend(key+'-ig', b.ig, 'views');
  makeTrend(key+'-fb', b.fb, 'views');
}

/* ============ influencer page ============ */
function renderInfluencer(){
  const inf=INF[MONTHS[cur].trim()];
  const el=document.getElementById('p-influencer');
  if(!inf){el.innerHTML=`<div class="page-title serif">Influencer activations</div><div class="page-sub">No activations logged for ${MONTHS[cur].trim()}.</div>`;return;}
  const t=inf.totals;
  let html=`<div class="page-title serif">Influencer activations</div>
    <div class="page-sub">${MONTHS[cur].trim()} · the impact of earned creator partnerships</div>
    <div class="grid g4">
      <div class="tile bronze"><div class="lbl">Activations</div><div class="val">${t.activations}</div><div class="delta" style="color:var(--bronze)">${t.posts} in-grid posts produced</div></div>
      <div class="tile hero"><div class="lbl">Combined creator audience</div><div class="val">${t.audience}</div><div class="delta" style="color:var(--muted)">total following</div></div>
      ${tileStatic('Post views',t.views)}
      ${tileStatic('Accounts reached',t.reached)}
    </div>
    <div class="grid g2" style="margin-top:14px">
      ${tileStatic('Total engagements',t.engagement)}
      ${tileStatic('Direct new follows driven',t.follows)}
    </div>
    <div class="section-label">Activation detail</div>`;
  for(const a of inf.activations){
    const stats=Object.entries(a.stats).map(([k,v])=>`<div class="mini"><div class="n">${fmt(v)}</div><div class="k">${k}</div></div>`).join('');
    const links=a.links.map(l=>`<a href="${l[1]}" target="_blank">${l[0]} ↗</a>`).join(' &nbsp;·&nbsp; ');
    html+=`<div class="act-card">
      <div class="act-head">
        <div><span class="act-handle">${a.handle}</span> <span class="pill">${a.size}</span></div>
        <div class="act-meta">${a.date} · ${a.type}</div>
      </div>
      <div class="act-meta" style="margin-bottom:12px">${a.partners}</div>
      <div class="act-stats">${stats}<div class="mini"><div class="n">${a.follows}</div><div class="k">Follows</div></div></div>
      <div class="brand-note" style="margin-top:14px">${a.note}</div>
      <div class="act-links">${links}</div>
    </div>`;
  }
  html+=`<div class="footnote">Reach and engagement reflect performance on each creator’s own channel (earned media). @mathildatraylor’s two evergreen posts continue to accrue views and are reported here as ongoing.</div>`;
  el.innerHTML=html;
}

/* ============ charts ============ */
const charts={};
function lab(n){return n==null?'':(n>=100000?Math.round(n/1000)+'k':n.toLocaleString());}
const valueLabel={
  id:'valueLabel',
  afterDatasetsDraw(chart){
    const meta=chart.getDatasetMeta(0); if(!meta)return;
    const ctx=chart.ctx; ctx.save();
    ctx.font='600 9.5px Inter,sans-serif'; ctx.fillStyle=ESP; ctx.textAlign='center'; ctx.textBaseline='bottom';
    meta.data.forEach((pt,i)=>{const v=chart.data.datasets[0].data[i]; if(v==null)return; ctx.fillText(lab(v),pt.x,pt.y-7);});
    ctx.restore();
  }
};
function baseOpts(){return{responsive:true,maintainAspectRatio:false,layout:{padding:{top:20}},
  plugins:{legend:{display:false},tooltip:{backgroundColor:ESP,padding:10,titleFont:{family:'Inter'},bodyFont:{family:'Inter'},callbacks:{label:c=>' '+(c.parsed.y==null?'no data':c.parsed.y.toLocaleString())}}},
  scales:{x:{grid:{display:false},ticks:{color:MUTED,font:{family:'Inter',size:11}}},
          y:{grid:{color:LINE},ticks:{color:MUTED,font:{family:'Inter',size:11},callback:v=>v>=1000?(v/1000)+'k':v},beginAtZero:true}},
  elements:{point:{radius:MONTHS.map((_,i)=>i===cur?5:3),hoverRadius:6}}};}
function lineData(arr){return{labels:MONTHS.map(m=>m.trim()),datasets:[{data:arr,borderColor:BRONZE,backgroundColor:'rgba(155,104,56,.08)',borderWidth:2.5,fill:true,tension:.32,spanGaps:true,
  pointBackgroundColor:arr.map((_,i)=>i===cur?ESP:BRONZE),pointBorderColor:'#fff',pointBorderWidth:1.5}]};}
function makeTrend(id,obj,metric){
  const ctx=document.getElementById(id+'-canvas'); if(!ctx)return;
  if(charts[id])charts[id].destroy();
  charts[id]=new Chart(ctx,{type:'line',data:lineData(obj[metric]),options:baseOpts(),plugins:[valueLabel]});
  charts[id]._obj=obj;
}
function drawSnap(arr){
  const ctx=document.getElementById('snapChart'); if(!ctx)return;
  if(charts.snap)charts.snap.destroy();
  charts.snap=new Chart(ctx,{type:'line',data:lineData(arr),options:baseOpts()});
}

/* ============ nav + month ============ */
const PAGES=[['snapshot','Snapshot'],['appellation','Appellation'],['folia','Folia'],['beeline','Beeline'],['influencer','Influencer']];
function buildNav(){
  const nav=document.getElementById('nav');
  nav.innerHTML=PAGES.map((p,i)=>`<button data-p="${p[0]}" class="${i===0?'active':''}">${p[1]}</button>`).join('');
  nav.querySelectorAll('button').forEach(btn=>btn.onclick=()=>{
    nav.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.page').forEach(pg=>pg.classList.remove('active'));
    document.getElementById('p-'+btn.dataset.p).classList.add('active');
    setTimeout(()=>Object.values(charts).forEach(c=>c&&c.resize()),30);
  });
}
function buildMonth(){
  const sel=document.getElementById('month');
  sel.innerHTML=monthsWithData.map(i=>`<option value="${i}" ${i===cur?'selected':''}>${MONTHS[i].trim()}</option>`).join('');
  sel.onchange=()=>{cur=+sel.value;renderAll();};
}
function renderAll(){renderSnapshot();renderBrand('appellation');renderBrand('folia');renderBrand('beeline');renderInfluencer();bindSegs();}
function bindSegs(){
  document.querySelectorAll('.seg').forEach(seg=>{
    const id=seg.dataset.chart;
    seg.querySelectorAll('button').forEach(btn=>btn.onclick=()=>{
      seg.querySelectorAll('button').forEach(b=>b.classList.remove('on'));btn.classList.add('on');
      const c=charts[id]; if(!c)return; const m=btn.dataset.m;
      c.data=lineData(c._obj[m]); c.options=baseOpts(); c.update();
    });
  });
}
buildNav();buildMonth();renderAll();
</script>
